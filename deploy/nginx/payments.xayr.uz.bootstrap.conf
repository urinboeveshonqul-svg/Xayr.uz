# ============================================================
# BOOTSTRAP ONLY — payments.xayr.uz (HTTP, no TLS yet)
#
# Solves the chicken-and-egg: the final config references Let's Encrypt certs
# that do not exist yet, so nginx would refuse to start, so certbot could never
# run to create them. This minimal HTTP config lets certbot answer the HTTP-01
# challenge; then you replace it with payments.xayr.uz.conf.
#
#   sudo cp deploy/nginx/payments.xayr.uz.bootstrap.conf \
#           /etc/nginx/sites-available/payments.xayr.uz
#   sudo ln -sf /etc/nginx/sites-available/payments.xayr.uz \
#               /etc/nginx/sites-enabled/payments.xayr.uz
#   sudo nginx -t && sudo systemctl reload nginx
#
# This file is TEMPORARY. Do not leave it in place — it serves no HTTPS.
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name payments.xayr.uz;

    # The only path certbot needs.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Nothing else exists on this host, even during bootstrap.
    location / {
        return 404;
    }
}

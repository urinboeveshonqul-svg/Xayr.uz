# ============================================================
# payments.xayr.uz — Click callback host (FINAL config)
#
# This VPS exists ONLY to give Click a static callback IP. It serves EXACTLY
# ONE route:
#
#     POST https://payments.xayr.uz/api/payments/click
#
# Everything else returns 404. The public site stays on Vercel — nothing here
# touches xayr.uz.
#
# Install (after certs exist — see the bootstrap config + runbook):
#   sudo cp deploy/nginx/payments.xayr.uz.conf \
#           /etc/nginx/sites-available/payments.xayr.uz
#   sudo ln -sf /etc/nginx/sites-available/payments.xayr.uz \
#               /etc/nginx/sites-enabled/payments.xayr.uz
#   sudo nginx -t && sudo systemctl reload nginx
#
# See docs/vps-click-callback.md.
# ============================================================

# ── HTTP → HTTPS ────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name payments.xayr.uz;

    # Keep the ACME path reachable so certbot can RENEW without downtime.
    # (Renewal fails silently in ~60 days if this is removed.)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ───────────────────────────────────────────────────────────────────
server {
    # `listen ... http2` is used rather than the newer `http2 on;` directive
    # because the latter is nginx >= 1.25.1 only and is a FATAL unknown
    # directive on 1.18/1.24 (Ubuntu 22.04/24.04). This form works on all of
    # them (it only logs a deprecation notice on 1.25+).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name payments.xayr.uz;

    ssl_certificate     /etc/letsencrypt/live/payments.xayr.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/payments.xayr.uz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Don't advertise the nginx version on a payments host.
    server_tokens off;

    # No browser ever visits this host; these are cheap and harmless.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Callbacks are small form posts. A low cap limits abuse surface.
    client_max_body_size 64k;

    # ── The ONLY exposed route ──────────────────────────────────────────────
    # `location =` is an exact match: /api/payments/click and nothing beneath it.
    location = /api/payments/click {
        # Click POSTs application/x-www-form-urlencoded. Anything else is not
        # part of the contract, so it does not exist. `if` + `return` is one of
        # the two officially safe uses of `if` in a location block; when the
        # condition is false the request falls through to proxy_pass below.
        if ($request_method != POST) {
            return 404;
        }

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Click expects a prompt answer; if we're slow it retries and may push
        # the payment to manual review. Fail fast rather than hang.
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Never serve a cached answer to a payment callback.
        proxy_buffering off;
    }

    # ── Everything else does not exist ──────────────────────────────────────
    # Admin, the donation API, the whole site: not reachable via this hostname.
    location / {
        return 404;
    }
}

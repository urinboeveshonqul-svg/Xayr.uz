<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 96" width="300" height="96" role="img" aria-labelledby="t d">
  <title id="t">Xayr logo</title>
  <desc id="d">Heart-X icon with the Xayr wordmark, for light backgrounds.</desc>
  <defs>
    <linearGradient id="xayrGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g fill="none" stroke="url(#xayrGreen)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <path d="M48 33 C32 19 18 37 29 50 C36 57 42 58 48 59 L72 80"/>
    <path d="M48 33 C64 19 78 37 67 50 C60 57 54 58 48 59 L24 80"/>
  </g>

  <!-- Wordmark: brand "X" tinted green, "ayr" in slate -->
  <text x="104" y="64" font-family="'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="54" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#059669">X</tspan><tspan fill="#0f172a">ayr</tspan>
  </text>
</svg>

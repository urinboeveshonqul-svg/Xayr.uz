<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="t d">
  <title id="t">Xayr favicon</title>
  <desc id="d">White Heart-X on a green tile so it stays visible on any browser tab color.</desc>
  <defs>
    <linearGradient id="xayrGreenFav" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Tile keeps the mark legible at 16–32px regardless of tab/background color -->
  <rect width="64" height="64" rx="14" fill="url(#xayrGreenFav)"/>

  <!-- Heart-X in white, scaled down with padding -->
  <g transform="translate(32 32) scale(0.46) translate(-48 -48)"
     fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <path d="M48 33 C32 19 18 37 29 50 C36 57 42 58 48 59 L72 80"/>
    <path d="M48 33 C64 19 78 37 67 50 C60 57 54 58 48 59 L24 80"/>
  </g>
</svg>

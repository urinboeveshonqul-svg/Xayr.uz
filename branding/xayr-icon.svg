<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-labelledby="t d">
  <title id="t">Xayr icon — Heart-X</title>
  <desc id="d">Two crossing strokes form an X whose upper arms curl into a heart.</desc>
  <defs>
    <linearGradient id="xayrGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Heart-X mark: stroke A = left lobe + bottom-right leg ("\"), stroke B = right lobe + bottom-left leg ("/") -->
  <g fill="none" stroke="url(#xayrGreen)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <path d="M48 33 C32 19 18 37 29 50 C36 57 42 58 48 59 L72 80"/>
    <path d="M48 33 C64 19 78 37 67 50 C60 57 54 58 48 59 L24 80"/>
  </g>
</svg>

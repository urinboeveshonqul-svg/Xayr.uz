<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="t d">
  <title id="t">Xayr app icon</title>
  <desc id="d">Full-bleed green tile with a white Heart-X, sized for iOS/Android app icons (OS applies corner masking).</desc>
  <defs>
    <linearGradient id="xayrGreenApp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed background; the platform masks the corners (squircle/round) -->
  <rect width="1024" height="1024" fill="url(#xayrGreenApp)"/>

  <!-- Heart-X in white, centered with safe-area padding -->
  <g transform="translate(512 512) scale(6.4) translate(-48 -48)"
     fill="none" stroke="#ffffff" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <path d="M48 33 C32 19 18 37 29 50 C36 57 42 58 48 59 L72 80"/>
    <path d="M48 33 C64 19 78 37 67 50 C60 57 54 58 48 59 L24 80"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 96" width="300" height="96" role="img" aria-labelledby="t d">
  <title id="t">Xayr logo (dark)</title>
  <desc id="d">Heart-X icon with the Xayr wordmark, tuned for dark backgrounds.</desc>
  <defs>
    <linearGradient id="xayrGreenDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Backdrop only to preview on dark; remove the rect when placing on an existing dark surface -->
  <rect width="300" height="96" fill="#0b1220"/>

  <!-- Icon (brighter green for contrast on dark) -->
  <g fill="none" stroke="url(#xayrGreenDark)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <path d="M48 33 C32 19 18 37 29 50 C36 57 42 58 48 59 L72 80"/>
    <path d="M48 33 C64 19 78 37 67 50 C60 57 54 58 48 59 L24 80"/>
  </g>

  <!-- Wordmark: brand "X" green, "ayr" near-white -->
  <text x="104" y="64" font-family="'Inter','Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
        font-size="54" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#34d399">X</tspan><tspan fill="#f8fafc">ayr</tspan>
  </text>
</svg>

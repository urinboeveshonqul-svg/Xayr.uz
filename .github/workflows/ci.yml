name: CI

# Catches the class of failure that took the site down (broken imports,
# type errors, build breaks) BEFORE it reaches Vercel.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # No package-lock.json is committed, so `npm ci` and setup-node's npm
      # cache (both require a lock file) can't be used. Use `npm install`.
      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      # No `next lint` step: the repo has no ESLint config, so `next lint` would
      # prompt interactively (and fail in CI). `next build` already skips ESLint
      # when no config is present, so this keeps CI and Vercel build behaviour
      # identical. Add an ESLint config + a lint step later if desired.

      - name: Build
        # Placeholder values: a valid URL keeps the Supabase clients from
        # throwing at build time. No real secrets are needed — pages that read
        # cookies render dynamically (at request time), not during the build.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: https://xayr.uz
        run: npm run build

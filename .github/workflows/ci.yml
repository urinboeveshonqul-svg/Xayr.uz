name: CI

# Catches the class of failure that took the site down (broken imports,
# type errors, build breaks) BEFORE it reaches Vercel.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # package-lock.json is committed → reproducible installs + npm cache.
      - name: Install dependencies
        run: npm ci

      # ESLint (next/core-web-vitals). Runs non-interactively now that
      # .eslintrc.json exists. `next build` keeps ESLint disabled
      # (next.config.mjs → eslint.ignoreDuringBuilds) so lint is a dedicated gate
      # here and can never break a production deploy.
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Focused unit tests for critical financial logic (payment signature/auth
      # verification, amount/currency checks, commission math, confirmDonation
      # idempotency). Pure functions + a mocked admin client — no DB/network.
      - name: Test
        run: npm run test

      - name: Build
        # Placeholder values: a valid URL keeps the Supabase clients from
        # throwing at build time. No real secrets are needed — pages that read
        # cookies render dynamically (at request time), not during the build.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: https://xayr.uz
        run: npm run build
